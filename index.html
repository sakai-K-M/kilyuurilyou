<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>人事考課表</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1714;
    --ink-light: #4a4642;
    --ink-faint: #8a8480;
    --paper: #f8f5f0;
    --paper-dark: #ede9e2;
    --cream: #fdfaf5;
    --gold: #b8963e;
    --gold-light: #d4b068;
    --gold-dim: #e8d5a0;
    --red: #c0392b;
    --border: #d4cfc8;
    --shadow: rgba(26,23,20,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--paper);
    font-family: 'Noto Sans JP', sans-serif;
    color: var(--ink);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  .header {
    background: var(--ink);
    padding: 0;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      90deg,
      transparent,
      transparent 60px,
      rgba(184,150,62,0.06) 60px,
      rgba(184,150,62,0.06) 61px
    );
  }
  .header-inner {
    max-width: 900px;
    margin: 0 auto;
    padding: 36px 40px 32px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    position: relative;
  }
  .header-title {
    font-family: 'Noto Serif JP', serif;
    color: var(--cream);
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 0.1em;
  }
  .header-title span {
    display: block;
    font-size: 12px;
    font-weight: 400;
    color: var(--gold-dim);
    letter-spacing: 0.3em;
    margin-bottom: 8px;
    font-family: 'Noto Sans JP', sans-serif;
  }
  .header-year {
    font-family: 'Noto Serif JP', serif;
    color: var(--gold);
    font-size: 42px;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1;
  }

  /* ── ROLE SWITCHER ── */
  .role-bar {
    background: var(--gold);
    padding: 0;
  }
  .role-bar-inner {
    max-width: 900px;
    margin: 0 auto;
    display: flex;
    padding: 0 40px;
  }
  .role-tab {
    padding: 12px 28px;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: rgba(26,23,20,0.5);
    cursor: pointer;
    border-bottom: 3px solid transparent;
    transition: all 0.2s;
    background: none;
    border-top: none; border-left: none; border-right: none;
    font-family: 'Noto Sans JP', sans-serif;
  }
  .role-tab.active {
    color: var(--ink);
    border-bottom-color: var(--ink);
  }
  .role-tab:hover:not(.active) {
    color: var(--ink-light);
  }

  /* ── MAIN ── */
  .main {
    max-width: 900px;
    margin: 0 auto;
    padding: 36px 40px 60px;
  }

  /* ── EMPLOYEE INFO ── */
  .info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 0;
    border: 1.5px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 36px;
    background: var(--cream);
  }
  .info-cell {
    padding: 14px 18px;
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }
  .info-cell:nth-child(3),
  .info-cell:nth-child(6),
  .info-cell:last-child {
    border-right: none;
  }
  .info-cell:nth-last-child(-n+3) { border-bottom: none; }
  .info-label {
    font-size: 10px;
    color: var(--ink-faint);
    letter-spacing: 0.15em;
    margin-bottom: 6px;
    font-weight: 500;
  }
  .info-input {
    width: 100%;
    border: none;
    background: none;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    color: var(--ink);
    outline: none;
    padding: 0;
  }
  .info-input::placeholder { color: var(--border); }
  .info-select {
    width: 100%;
    border: none;
    background: none;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    color: var(--ink);
    outline: none;
    padding: 0;
    appearance: none;
    cursor: pointer;
  }

  /* ── SECTION ── */
  .section {
    margin-bottom: 32px;
    animation: fadeUp 0.4s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 2px solid var(--ink);
  }
  .section-icon {
    width: 28px;
    height: 28px;
    background: var(--ink);
    color: var(--gold);
    border-radius: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    flex-shrink: 0;
  }
  .section-title {
    font-family: 'Noto Serif JP', serif;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 0.06em;
  }
  .section-weight {
    margin-left: auto;
    font-size: 11px;
    color: var(--ink-faint);
    letter-spacing: 0.1em;
  }

  /* ── EVALUATION TABLE ── */
  .eval-table {
    width: 100%;
    border-collapse: collapse;
    background: var(--cream);
    border: 1.5px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    font-size: 13px;
  }
  .eval-table thead tr {
    background: var(--ink);
  }
  .eval-table th {
    padding: 10px 14px;
    color: var(--gold-dim);
    font-weight: 500;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-align: left;
  }
  .eval-table th.center { text-align: center; }
  .eval-table tr + tr td { border-top: 1px solid var(--border); }
  .eval-table td {
    padding: 12px 14px;
    vertical-align: middle;
  }
  .item-name {
    font-weight: 500;
    color: var(--ink);
    font-size: 13.5px;
  }
  .item-desc {
    font-size: 11.5px;
    color: var(--ink-faint);
    margin-top: 3px;
    line-height: 1.5;
  }

  /* ── STAR RATING ── */
  .stars {
    display: flex;
    gap: 4px;
    justify-content: center;
  }
  .star-btn {
    width: 28px;
    height: 28px;
    background: none;
    border: 1.5px solid var(--border);
    border-radius: 2px;
    cursor: pointer;
    font-size: 15px;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    color: var(--border);
    position: relative;
  }
  .star-btn:hover { border-color: var(--gold); }
  .star-btn.active {
    background: var(--gold);
    border-color: var(--gold);
    color: var(--ink);
  }
  .star-btn[data-val="5"].active { background: var(--ink); border-color: var(--ink); color: var(--gold); }

  .score-badge {
    display: inline-block;
    min-width: 32px;
    text-align: center;
    font-weight: 700;
    font-size: 16px;
    color: var(--gold);
    font-family: 'Noto Serif JP', serif;
  }

  /* ── COMMENT ── */
  .comment-box {
    background: var(--cream);
    border: 1.5px solid var(--border);
    border-radius: 4px;
    padding: 14px 18px;
    margin-top: 10px;
  }
  .comment-label {
    font-size: 10px;
    color: var(--ink-faint);
    letter-spacing: 0.15em;
    margin-bottom: 8px;
    font-weight: 500;
  }
  textarea {
    width: 100%;
    min-height: 70px;
    border: none;
    background: none;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    color: var(--ink);
    outline: none;
    resize: vertical;
    line-height: 1.7;
  }
  textarea::placeholder { color: var(--border); }

  /* ── SUMMARY ── */
  .summary-bar {
    background: var(--ink);
    border-radius: 4px;
    padding: 20px 28px;
    display: flex;
    align-items: center;
    gap: 32px;
    margin-bottom: 32px;
    flex-wrap: wrap;
  }
  .summary-item { text-align: center; }
  .summary-label {
    font-size: 10px;
    color: var(--gold-dim);
    letter-spacing: 0.2em;
    margin-bottom: 4px;
  }
  .summary-value {
    font-family: 'Noto Serif JP', serif;
    font-size: 28px;
    font-weight: 700;
    color: var(--gold);
  }
  .summary-value.big { font-size: 36px; }
  .summary-divider {
    width: 1px;
    height: 50px;
    background: rgba(255,255,255,0.1);
  }
  .rank-chip {
    display: inline-block;
    padding: 4px 14px;
    border-radius: 2px;
    font-weight: 700;
    font-size: 22px;
    font-family: 'Noto Serif JP', serif;
    letter-spacing: 0.05em;
  }
  .rank-S { background: var(--gold); color: var(--ink); }
  .rank-A { background: #2ecc71; color: white; }
  .rank-B { background: #3498db; color: white; }
  .rank-C { background: #e67e22; color: white; }
  .rank-D { background: #c0392b; color: white; }

  /* ── ACTIONS ── */
  .actions {
    display: flex;
    gap: 14px;
    justify-content: flex-end;
    margin-top: 36px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
  }
  .btn {
    padding: 12px 28px;
    border-radius: 2px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.2s;
    border: none;
  }
  .btn-ghost {
    background: transparent;
    border: 1.5px solid var(--border);
    color: var(--ink-light);
  }
  .btn-ghost:hover { border-color: var(--ink-light); color: var(--ink); }
  .btn-primary {
    background: var(--ink);
    color: var(--gold);
  }
  .btn-primary:hover { background: #2d2a27; }
  .btn-print {
    background: var(--gold);
    color: var(--ink);
  }
  .btn-print:hover { background: var(--gold-light); }

  /* ── HIDDEN SECTION ── */
  .section[data-role] { display: none; }

  /* ── PROGRESS ── */
  .progress-bar-wrap {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 16px;
    margin-bottom: 36px;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold) 0%, var(--gold-light) 100%);
    border-radius: 2px;
    transition: width 0.5s ease;
  }

  @media (max-width: 600px) {
    .main { padding: 24px 20px 48px; }
    .header-inner { padding: 24px 20px; flex-direction: column; align-items: flex-start; gap: 8px; }
    .info-grid { grid-template-columns: 1fr 1fr; }
    .info-cell:nth-child(2n) { border-right: none; }
    .info-cell:nth-last-child(-n+2) { border-bottom: none; }
    .info-cell:nth-last-child(-n+3) { border-bottom: 1px solid var(--border); }
    .stars { gap: 2px; }
    .star-btn { width: 24px; height: 24px; font-size: 13px; }
    .summary-bar { gap: 18px; }
    .role-bar-inner { padding: 0 20px; }
  }

  @media print {
    .role-bar, .actions { display: none; }
    .star-btn { border: 1px solid #ccc; }
    body { background: white; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div>
      <div class="header-title">
        <span>PERFORMANCE EVALUATION</span>
        人事考課表
      </div>
    </div>
    <div class="header-year" id="year-display"></div>
  </div>
</div>

<div class="role-bar">
  <div class="role-bar-inner">
    <button class="role-tab active" onclick="setRole('general')">一般社員</button>
    <button class="role-tab" onclick="setRole('manager')">管理職・リーダー</button>
  </div>
</div>

<div class="main">

  <!-- 基本情報 -->
  <div class="info-grid">
    <div class="info-cell">
      <div class="info-label">部　　署</div>
      <input class="info-input" placeholder="例：営業本部 第一営業部">
    </div>
    <div class="info-cell">
      <div class="info-label">氏　　名</div>
      <input class="info-input" placeholder="山田 太郎">
    </div>
    <div class="info-cell">
      <div class="info-label">社員番号</div>
      <input class="info-input" placeholder="A-00001">
    </div>
    <div class="info-cell">
      <div class="info-label">役　　職</div>
      <input class="info-input" placeholder="主任">
    </div>
    <div class="info-cell">
      <div class="info-label">評価期間</div>
      <input class="info-input" id="eval-period" placeholder="2025年4月〜2026年3月">
    </div>
    <div class="info-cell">
      <div class="info-label">評価者氏名</div>
      <input class="info-input" placeholder="鈴木 一郎">
    </div>
  </div>

  <!-- 進捗バー -->
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
  </div>

  <!-- サマリー -->
  <div class="summary-bar" id="summary-bar">
    <div class="summary-item">
      <div class="summary-label">総合得点</div>
      <div class="summary-value big" id="total-score">—</div>
    </div>
    <div class="summary-divider"></div>
    <div class="summary-item">
      <div class="summary-label">平均スコア</div>
      <div class="summary-value" id="avg-score">—</div>
    </div>
    <div class="summary-divider"></div>
    <div class="summary-item">
      <div class="summary-label">総合評価</div>
      <div id="rank-display"><span class="rank-chip rank-B" id="rank-chip" style="display:none"></span></div>
    </div>
    <div class="summary-divider"></div>
    <div class="summary-item" id="cat-scores" style="display:flex;gap:24px;flex-wrap:wrap;"></div>
  </div>

  <!-- 1. 業績・目標達成 -->
  <div class="section">
    <div class="section-header">
      <div class="section-icon">業</div>
      <div class="section-title">業績・目標達成</div>
      <div class="section-weight">配点比重 30%</div>
    </div>
    <table class="eval-table">
      <thead>
        <tr>
          <th style="width:40%">評価項目</th>
          <th class="center" style="width:30%">評　価</th>
          <th class="center" style="width:10%">点数</th>
        </tr>
      </thead>
      <tbody id="tbody-gyoseki"></tbody>
    </table>
    <div class="comment-box">
      <div class="comment-label">コメント・自己評価記入欄</div>
      <textarea placeholder="目標に対する達成状況、特筆すべき成果、課題等をご記入ください。"></textarea>
    </div>
  </div>

  <!-- 2. 能力・スキル -->
  <div class="section">
    <div class="section-header">
      <div class="section-icon">能</div>
      <div class="section-title">能力・スキル</div>
      <div class="section-weight">配点比重 25%</div>
    </div>
    <table class="eval-table">
      <thead>
        <tr>
          <th style="width:40%">評価項目</th>
          <th class="center" style="width:30%">評　価</th>
          <th class="center" style="width:10%">点数</th>
        </tr>
      </thead>
      <tbody id="tbody-skill"></tbody>
    </table>
    <div class="comment-box">
      <div class="comment-label">コメント・自己評価記入欄</div>
      <textarea placeholder="習得・発揮したスキル、成長した点、今後の課題等をご記入ください。"></textarea>
    </div>
  </div>

  <!-- 3. 行動・姿勢・態度 -->
  <div class="section">
    <div class="section-header">
      <div class="section-icon">行</div>
      <div class="section-title">行動・姿勢・態度</div>
      <div class="section-weight">配点比重 25%</div>
    </div>
    <table class="eval-table">
      <thead>
        <tr>
          <th style="width:40%">評価項目</th>
          <th class="center" style="width:30%">評　価</th>
          <th class="center" style="width:10%">点数</th>
        </tr>
      </thead>
      <tbody id="tbody-conduct"></tbody>
    </table>
    <div class="comment-box">
      <div class="comment-label">コメント・自己評価記入欄</div>
      <textarea placeholder="日頃の行動・姿勢について具体的なエピソードとともにご記入ください。"></textarea>
    </div>
  </div>

  <!-- 4. マネジメント力（管理職のみ） -->
  <div class="section" data-role="manager" id="section-mgmt">
    <div class="section-header">
      <div class="section-icon">管</div>
      <div class="section-title">マネジメント力</div>
      <div class="section-weight">配点比重 20%</div>
    </div>
    <table class="eval-table">
      <thead>
        <tr>
          <th style="width:40%">評価項目</th>
          <th class="center" style="width:30%">評　価</th>
          <th class="center" style="width:10%">点数</th>
        </tr>
      </thead>
      <tbody id="tbody-mgmt"></tbody>
    </table>
    <div class="comment-box">
      <div class="comment-label">コメント・自己評価記入欄</div>
      <textarea placeholder="チームマネジメントや部下育成の実績・課題等をご記入ください。"></textarea>
    </div>
  </div>

  <!-- 総合コメント -->
  <div class="section">
    <div class="section-header">
      <div class="section-icon">総</div>
      <div class="section-title">総合コメント</div>
    </div>
    <div class="comment-box">
      <div class="comment-label">評価者コメント</div>
      <textarea placeholder="被評価者の総合的な評価、強み・弱み、今後への期待等を記入してください。" style="min-height:90px;"></textarea>
    </div>
    <div class="comment-box" style="margin-top:10px;">
      <div class="comment-label">次期目標・育成方針</div>
      <textarea placeholder="次期の重点目標、必要なサポート、キャリア開発に向けた方針等を記入してください。" style="min-height:90px;"></textarea>
    </div>
  </div>

  <!-- アクション -->
  <div class="actions">
    <button class="btn btn-ghost" onclick="resetAll()">リセット</button>
    <button class="btn btn-ghost" onclick="window.print()">🖨 印刷</button>
    <button class="btn btn-primary" onclick="save()">📋 内容を保存</button>
  </div>

</div><!-- /main -->

<script>
// ─────────────────────────────────────────────
// DATA
// ─────────────────────────────────────────────
const ITEMS = {
  gyoseki: [
    { name: '目標達成度', desc: '期初に設定した定量・定性目標に対する達成度' },
    { name: '業務品質', desc: '成果物の正確性・完成度・クオリティの高さ' },
    { name: '生産性・効率性', desc: '業務スピードと工数対効果のバランス' },
    { name: '課題解決力', desc: '問題を発見し、自律的に解決へ導く力' },
  ],
  skill: [
    { name: '専門知識・技術', desc: '職務に必要な知識・スキルの習得・活用度' },
    { name: '企画・提案力', desc: '新しいアイデアや改善提案を行う能力' },
    { name: '判断力・決断力', desc: '状況を正確に把握し適切な判断を下す力' },
    { name: '自己啓発', desc: 'スキルアップへの積極的な取り組み姿勢' },
  ],
  conduct: [
    { name: '規律・責任感', desc: 'ルール遵守、約束を守る誠実さと責任感' },
    { name: 'チームワーク', desc: '協調性、他者への貢献と助け合いの姿勢' },
    { name: 'コミュニケーション', desc: '報告・連絡・相談、適切な情報共有能力' },
    { name: '顧客・相手志向', desc: '顧客や関係者のニーズを把握し行動する力' },
  ],
  mgmt: [
    { name: 'チーム目標管理', desc: 'チームの目標設定と進捗管理の的確さ' },
    { name: '部下育成・指導', desc: 'メンバーの成長を促すコーチングと指導力' },
    { name: 'リーダーシップ', desc: 'チームを方向付け、メンバーを牽引する力' },
    { name: '組織貢献・戦略眼', desc: '部門・会社全体を俯瞰した行動と提言' },
  ],
};

const LABELS = ['', '要改善', '改善必要', '標準', '良好', '優秀'];
let scores = {};
let currentRole = 'general';

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
function init() {
  const now = new Date();
  document.getElementById('year-display').textContent = now.getFullYear();
  document.getElementById('eval-period').placeholder =
    `${now.getFullYear()-1}年4月〜${now.getFullYear()}年3月`;

  buildTable('tbody-gyoseki', ITEMS.gyoseki, 'gyoseki');
  buildTable('tbody-skill',   ITEMS.skill,   'skill');
  buildTable('tbody-conduct', ITEMS.conduct,  'conduct');
  buildTable('tbody-mgmt',    ITEMS.mgmt,     'mgmt');

  updateSummary();
}

function buildTable(tbodyId, items, cat) {
  const tbody = document.getElementById(tbodyId);
  items.forEach((item, idx) => {
    const key = `${cat}_${idx}`;
    scores[key] = 0;
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>
        <div class="item-name">${item.name}</div>
        <div class="item-desc">${item.desc}</div>
      </td>
      <td style="text-align:center">
        <div class="stars" id="stars-${key}">
          ${[1,2,3,4,5].map(v => `
            <button class="star-btn" data-key="${key}" data-val="${v}" title="${LABELS[v]}" onclick="setScore('${key}',${v})">
              ${v}
            </button>
          `).join('')}
        </div>
      </td>
      <td style="text-align:center">
        <span class="score-badge" id="badge-${key}">—</span>
      </td>
    `;
    tbody.appendChild(tr);
  });
}

// ─────────────────────────────────────────────
// SCORING
// ─────────────────────────────────────────────
function setScore(key, val) {
  scores[key] = val;
  const container = document.getElementById(`stars-${key}`);
  container.querySelectorAll('.star-btn').forEach(btn => {
    btn.classList.toggle('active', parseInt(btn.dataset.val) <= val);
  });
  document.getElementById(`badge-${key}`).textContent = val;
  updateSummary();
}

function updateSummary() {
  const cats = currentRole === 'manager'
    ? ['gyoseki','skill','conduct','mgmt']
    : ['gyoseki','skill','conduct'];

  const weights = currentRole === 'manager'
    ? { gyoseki:0.30, skill:0.25, conduct:0.25, mgmt:0.20 }
    : { gyoseki:0.375, skill:0.3125, conduct:0.3125 };

  let totalWeighted = 0;
  let totalItems = 0;
  let filled = 0;
  const allKeys = Object.keys(scores);
  const activeCats = { gyoseki: ITEMS.gyoseki, skill: ITEMS.skill, conduct: ITEMS.conduct };
  if (currentRole === 'manager') activeCats.mgmt = ITEMS.mgmt;

  let catData = [];
  cats.forEach(cat => {
    const items = activeCats[cat];
    let sum = 0, count = 0;
    items.forEach((_, idx) => {
      const key = `${cat}_${idx}`;
      const v = scores[key] || 0;
      if (v > 0) { sum += v; count++; filled++; }
      totalItems++;
    });
    const avg = count > 0 ? (sum / count) : 0;
    totalWeighted += avg * weights[cat] * 20; // scale to 100
    catData.push({ cat, avg: avg.toFixed(1) });
  });

  const progress = Math.round((filled / totalItems) * 100);
  document.getElementById('progress-fill').style.width = progress + '%';

  if (filled === 0) {
    document.getElementById('total-score').textContent = '—';
    document.getElementById('avg-score').textContent = '—';
    document.getElementById('rank-chip').style.display = 'none';
    document.getElementById('cat-scores').innerHTML = '';
    return;
  }

  const total = Math.round(totalWeighted);
  const avg = (totalWeighted / 20).toFixed(2);
  document.getElementById('total-score').textContent = total;
  document.getElementById('avg-score').textContent = avg;

  const rank = total >= 90 ? 'S' : total >= 75 ? 'A' : total >= 55 ? 'B' : total >= 35 ? 'C' : 'D';
  const chip = document.getElementById('rank-chip');
  chip.style.display = 'inline-block';
  chip.textContent = rank;
  chip.className = `rank-chip rank-${rank}`;

  const catNames = { gyoseki:'業績', skill:'能力', conduct:'行動', mgmt:'管理' };
  document.getElementById('cat-scores').innerHTML = catData.map(d => `
    <div class="summary-item">
      <div class="summary-label">${catNames[d.cat]}</div>
      <div class="summary-value" style="font-size:20px">${d.avg}</div>
    </div>
  `).join('');
}

// ─────────────────────────────────────────────
// ROLE SWITCHER
// ─────────────────────────────────────────────
function setRole(role) {
  currentRole = role;
  document.querySelectorAll('.role-tab').forEach((t, i) => {
    t.classList.toggle('active', (i === 0 && role === 'general') || (i === 1 && role === 'manager'));
  });
  const mgmtSection = document.getElementById('section-mgmt');
  mgmtSection.style.display = role === 'manager' ? 'block' : 'none';
  updateSummary();
}

// ─────────────────────────────────────────────
// RESET / SAVE
// ─────────────────────────────────────────────
function resetAll() {
  if (!confirm('入力内容をすべてリセットしますか？')) return;
  Object.keys(scores).forEach(k => { scores[k] = 0; });
  document.querySelectorAll('.star-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.score-badge').forEach(b => b.textContent = '—');
  document.querySelectorAll('textarea').forEach(t => t.value = '');
  document.querySelectorAll('.info-input').forEach(i => i.value = '');
  updateSummary();
}

function save() {
  const data = {
    scores,
    role: currentRole,
    timestamp: new Date().toLocaleString('ja-JP'),
  };
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `考課表_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  alert('評価データを保存しました。');
}

// ─────────────────────────────────────────────
init();
</script>
</body>
</html>
