<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ログインテスト</title>
</head>
<body>

<h2>ログインテストページ</h2>

<input id="email" type="email" placeholder="メールアドレス"><br>
<input id="password" type="password" placeholder="パスワード"><br>
<button id="login">ログイン</button>

<p id="status"></p>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
  import { 
    getAuth, 
    createUserWithEmailAndPassword, 
    signInWithEmailAndPassword, 
    onAuthStateChanged 
  } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyC1MnMwO696MaBEdTNrr9r_TXHy7WrOvuM",
    authDomain: "otamesideyaltuteiru.firebaseapp.com",
    projectId: "otamesideyaltuteiru",
    storageBucket: "otamesideyaltuteiru.firebasestorage.app",
    messagingSenderId: "800699206830",
    appId: "1:800699206830:web:7caf540fcc4aceeac4f13f"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);



  // ログイン
  document.getElementById("login").onclick = async () => {
    const email = document.getElementById("email").value;
    const pass = document.getElementById("password").value;

    try {
      await signInWithEmailAndPassword(auth, email, pass);
      document.getElementById("status").textContent = "ログイン成功！";
    } catch (e) {
      document.getElementById("status").textContent = "エラー: " + e.message;
    }
  };

  // ログイン状態監視
  onAuthStateChanged(auth, (user) => {
    if (user) {
      document.getElementById("status").textContent = "ログイン中: " + user.email;
    } else {
      document.getElementById("status").textContent = "ログアウト中";
    }
  });
</script>

</body>
</html>
