<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ログインテスト（role 判定付き）</title>
</head>
<body>

<h2>ログインテスト</h2>

<input id="email" type="email" placeholder="メールアドレス"><br>
<input id="password" type="password" placeholder="パスワード"><br>
<button id="login">ログイン</button>

<p id="status"></p>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
  import { 
    getAuth, 
    signInWithEmailAndPassword, 
    onAuthStateChanged 
  } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

  import { 
    getFirestore, 
    doc, 
    getDoc 
  } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

  // Firebase 設定
  const firebaseConfig = {
    apiKey: "AIzaSyC1MnMwO696MaBEdTNrr9r_TXHy7WrOvuM",
    authDomain: "otamesideyaltuteiru.firebaseapp.com",
    projectId: "otamesideyaltuteiru",
    storageBucket: "otamesideyaltuteiru.firebasestorage.app",
    messagingSenderId: "800699206830",
    appId: "1:800699206830:web:7caf540fcc4aceeac4f13f"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // ログイン処理
  document.getElementById("login").onclick = async () => {
    const email = document.getElementById("email").value;
    const pass = document.getElementById("password").value;

    try {
      await signInWithEmailAndPassword(auth, email, pass);
      document.getElementById("status").textContent = "ログイン成功！";
    } catch (e) {
      document.getElementById("status").textContent = "エラー: " + e.message;
    }
  };

  // ログイン状態監視 + role 判定
  onAuthStateChanged(auth, async (user) => {
    const status = document.getElementById("status");

    if (user) {
      // Firestore から role を取得
      const ref = doc(db, "users", user.uid);
      const snap = await getDoc(ref);

      let role = "user"; // デフォルト
      if (snap.exists()) {
        role = snap.data().role || "user";
      }

      if (role === "admin") {
        status.textContent = "管理者としてログイン中: " + user.email;
      } else {
        status.textContent = "一般ユーザーとしてログイン中: " + user.email;
      }

    } else {
      status.textContent = "ログアウト中";
    }
  });
</script>

</body>
</html>
