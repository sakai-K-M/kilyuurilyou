<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ログインテスト</title>

  <style>
    body {
      background-color: pink;
      font-size: 20px;
      padding: 20px;
    }
    #adminMessage {
      color: red;
      font-weight: bold;
      margin-top: 20px;
      font-size: 28px;
    }
  </style>
</head>
<body>

  <h2>ログインテスト</h2>

  <input id="email" type="email" placeholder="メールアドレス"><br>
  <input id="password" type="password" placeholder="パスワード"><br>

  <button id="login">ログイン</button>
  <button id="logout">ログアウト</button>

  <p id="status">ログアウト中</p>
  <p id="adminMessage"></p>

  <!-- ★ 必ず body の一番下に置く -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import { 
      getAuth, 
      signInWithEmailAndPassword, 
      onAuthStateChanged,
      signOut,
      setPersistence,
      browserLocalPersistence
    } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

    import { 
      getFirestore, 
      doc, 
      getDoc 
    } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

    // Firebase 設定
    const firebaseConfig = {
      apiKey: "AIzaSyC1MnMwO696MaBEdTNrr9r_TXHy7WrOvuM",
      authDomain: "otamesideyaltuteiru.firebaseapp.com",
      projectId: "otamesideyaltuteiru",
      storageBucket: "otamesideyaltuteiru.firebasestorage.app",
      messagingSenderId: "800699206830",
      appId: "1:800699206830:web:7caf540fcc4aceeac4f13f"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // ★ サブフォルダでもログイン状態を保持
    await setPersistence(auth, browserLocalPersistence);

    // ログイン処理
    document.getElementById("login").onclick = async () => {
      const email = document.getElementById("email").value;
      const pass = document.getElementById("password").value;

      try {
        await signInWithEmailAndPassword(auth, email, pass);
        document.getElementById("status").textContent = "ログイン成功！";
      } catch (e) {
        document.getElementById("status").textContent = "エラー: " + e.message;
      }
    };

    // ログアウト処理
    document.getElementById("logout").onclick = async () => {
      await signOut(auth);
      document.getElementById("status").textContent = "ログアウトしました";
      document.getElementById("adminMessage").textContent = "";
    };

    // ログイン状態監視 + role 判定
    onAuthStateChanged(auth, async (user) => {
      const status = document.getElementById("status");
      const adminMessage = document.getElementById("adminMessage");

      if (user) {
        console.log("ログイン中のUID:", user.uid);

        const ref = doc(db, "users", user.uid);
        const snap = await getDoc(ref);

        let role = "user";
        if (snap.exists()) {
          role = snap.data().role || "user";
        }

        if (role === "admin") {
          status.textContent = "管理者としてログイン中: " + user.email;
          adminMessage.textContent = "成功です！";
        } else {
          status.textContent = "一般ユーザーとしてログイン中: " + user.email;
          adminMessage.textContent = "";
        }

      } else {
        status.textContent = "ログアウト中";
        adminMessage.textContent = "";
      }
    });
  </script>

</body>
</html>
